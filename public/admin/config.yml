# -------------------------------------------------------
# LOCAL DEVELOPMENT
# Run `npx decap-server` in a separate terminal, then
# visit http://localhost:4321/admin/
# -------------------------------------------------------
local_backend: true

# -------------------------------------------------------
# PRODUCTION — uncomment one backend and remove local_backend
# -------------------------------------------------------

# Option A: Netlify + Git Gateway
# backend:
#   name: git-gateway
#   branch: main

# Option B: GitHub (no Netlify required)
# backend:
#   name: github
#   repo: your-username/your-repo
#   branch: main

# -------------------------------------------------------

media_folder: public/images
public_folder: /images

collections:
  - name: logs
    label: Logs
    label_singular: Log
    folder: src/content/logs
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        time_format: false

      - label: Description
        name: description
        widget: string

      - label: Type
        name: type
        widget: select
        options:
          - { label: Writing,      value: writing }
          - { label: Mix,          value: mix }
          - { label: Review,       value: review }
          - { label: Conversation, value: conversation }
          - { label: Experiment,   value: experiment }

      - label: Log Number
        name: logNumber
        widget: number
        required: false
        value_type: int
        min: 1

      - label: Draft
        name: draft
        widget: boolean
        required: false
        default: false

      - label: Body
        name: body
        widget: markdown
